<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>jdub studio</title>
<style>
  :root {
    --bg: #17191d; --card: #1e2126; --border: #33373e;
    --ink: #e9e7e2; --ink-2: #98938a; --accent: #e8622d;
    --good: #7dc383; --warn: #d9a848;
    --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); margin: 0;
         display: flex; justify-content: center; padding: 18px; font-size: 14px; }
  #card { width: min(1720px, 100%); background: var(--card); border: 1px solid var(--border);
          border-radius: 14px; padding: 18px 22px 14px; }
  #main { display: grid; grid-template-columns: 212px minmax(0, 1fr) 330px; gap: 16px; align-items: start; }
  @media (max-width: 1280px) {  /* narrow screens: court first, panels stack below */
    #main { grid-template-columns: 1fr; }
    #center { order: -1; }
    #chips { flex-direction: row; flex-wrap: wrap; }
    #right .panel { max-height: 300px; }
  }
  .panel { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px;
           display: flex; flex-direction: column; }
  .panel h2 { font-size: 11px; letter-spacing: .14em; color: var(--ink-2); font-weight: 600; margin: 0;
              padding: 9px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }

  /* -- header -- */
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  #logo { display: flex; align-items: center; gap: 9px; margin-right: 10px; }
  #logo svg { display: block; }
  #logo .wm { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
  #logo .wm span { color: var(--ink-2); font-weight: 300; }
  select, button {
    background: transparent; color: var(--ink); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer;
  }
  select:hover, button:hover { border-color: #4a5058; }
  #poss { max-width: 340px; }
  #status { margin-left: auto; font-family: var(--mono); font-size: 13.5px; color: var(--ink-2); white-space: nowrap; }
  #status b { color: var(--ink); font-weight: 600; }

  /* -- court -- */
  canvas { display: block; width: 100%; height: auto; background: #17191d;
           border: 1px solid var(--border); border-radius: 10px; }

  /* -- transport -- */
  #transport { display: flex; align-items: center; gap: 12px; margin: 12px 0 10px; }
  #play { width: 40px; height: 32px; font-weight: 700; }
  #play.on { background: var(--accent); border-color: var(--accent); color: #16110d; }
  #scrubwrap { flex: 1; }
  #scrub { width: 100%; margin: 0; accent-color: var(--accent); display: block; }
  #ticks { position: relative; height: 7px; margin-top: 3px; }
  .tick { position: absolute; width: 4px; height: 7px; border-radius: 1px; cursor: pointer; background: var(--accent); }
  #ptime { font-family: var(--mono); font-size: 14px; min-width: 118px; text-align: right; }
  #gclock { font-family: var(--mono); font-size: 12px; color: var(--ink-2); min-width: 132px; }

  /* -- left: layer toggles + on-court roster -- */
  #chips { display: flex; flex-direction: column; gap: 6px; padding: 10px; }
  #chips button { border-radius: 8px; padding: 6px 12px; font-size: 13px; color: var(--ink-2); text-align: left; }
  #chips button.on { background: var(--accent); border-color: var(--accent); color: #16110d; font-weight: 600; }
  #roster { padding: 10px 12px; font-size: 12.5px; }
  #roster .team { margin-bottom: 10px; }
  #roster .team b { display: block; margin-bottom: 4px; }
  #roster span.p { display: block; color: var(--ink-2); line-height: 1.75; }
  #roster span.p em { font-style: normal; font-family: var(--mono); color: var(--ink); display: inline-block; min-width: 30px; }

  /* -- right: calls stream -- */
  #right .panel { max-height: calc(100vh - 140px); margin-bottom: 0; }
  #stream-head .sort { margin-left: auto; display: flex; gap: 2px; }
  #stream-head .sort button { border: 0; background: transparent; font-family: var(--mono); font-size: 11px;
                              letter-spacing: .08em; color: var(--ink-2); padding: 2px 7px; }
  #stream-head .sort button.on { color: var(--accent); }
  #calls { font-family: var(--mono); font-size: 13px; overflow-y: auto; flex: 1; }
  .call { padding: 7px 12px; cursor: pointer; border-left: 2px solid transparent;
          border-bottom: 1px solid rgba(51,55,62,.55); }
  .call:hover { background: rgba(233,231,226,.04); }
  .call.live { background: rgba(232,98,45,.1); border-left-color: var(--accent); }
  .call .ts { color: var(--accent); margin-right: 10px; }
  .call .k { color: var(--ink); }
  .call .who { color: var(--ink); font-family: var(--sans); display: block; margin-top: 2px; }
  .call.dim .who, .call.dim .k { color: var(--ink-2); }
  .call.dim .who { text-decoration: underline dotted rgba(152,147,138,.7); text-underline-offset: 3px; }
  .call .cf { float: right; }
  .call .cf.hi { color: var(--good); }
  .call .cf.lo { color: var(--warn); }
  .empty { padding: 26px 16px; text-align: center; color: var(--ink-2); }
  .empty .h { color: var(--ink); font-size: 13.5px; margin-bottom: 3px; }
  .empty .s { font-size: 12px; }

  /* -- commentary subtitles (M4): sentence <-> court two-way highlight -- */
  #commentary { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .sent { font-size: 15.5px; color: var(--ink-2); padding: 4px 10px; border-left: 2px solid transparent;
          cursor: pointer; line-height: 1.65; }
  .sent:hover { color: var(--ink); }
  .sent.live { color: var(--ink); border-left-color: var(--accent); }

  /* -- under-court pbp -- */
  #pbp { font-size: 15px; margin-top: 10px; }
  #pbp b { color: var(--ink-2); font-weight: 600; font-size: 11px; letter-spacing: .14em; margin-right: 8px; }
  #pbp a { color: var(--accent); text-decoration: none; margin-left: 12px; font-size: 13px; }
  #pbp a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="card">
<header>
  <div id="logo">
    <svg width="26" height="26" viewBox="0 0 26 26">
      <circle cx="13" cy="13" r="11.5" fill="none" stroke="#e8622d" stroke-width="2"/>
      <path d="M13 1.5 v23 M1.5 13 h23 M4.8 4.8 q5 5.5 0 16.4 M21.2 4.8 q-5 5.5 0 16.4"
            fill="none" stroke="#e8622d" stroke-width="1.6"/>
    </svg>
    <div class="wm">jdub <span>studio</span></div>
  </div>
  <select id="game"></select>
  <select id="poss"></select>
  <button id="prev" title="Previous possession">‹</button>
  <button id="next" title="Next possession">›</button>
  <div id="status"></div>
</header>

<div id="main">
  <aside id="left">
    <div class="panel">
      <h2>LAYERS</h2>
      <div id="chips">
        <button data-l="matchups">Matchups</button>
        <button data-l="actions" class="on">Actions</button>
        <button data-l="trail" class="on">Ball trail</button>
        <button data-l="participants">Participants only</button>
      </div>
    </div>
    <div class="panel">
      <h2>ON COURT</h2>
      <div id="roster"></div>
    </div>
  </aside>

  <section id="center">
    <canvas id="court" width="1400" height="760"></canvas>
    <div id="transport">
      <button id="play" title="Space">▶</button>
      <select id="speed"><option value="0.25">0.25×</option><option value="0.5">0.5×</option><option value="1" selected>1×</option></select>
      <span id="gclock"></span>
      <div id="scrubwrap">
        <input type="range" id="scrub" min="0" max="0" value="0">
        <div id="ticks"></div>
      </div>
      <span id="ptime"></span>
    </div>
    <div id="pbp"></div>
    <div id="commentary"></div>
  </section>

  <aside id="right">
    <div class="panel">
      <h2 id="stream-head">CALLS<span class="sort"><button data-s="time" class="on">TIME</button><button data-s="conf">CONF</button></span></h2>
      <div id="calls"></div>
    </div>
  </aside>
</div>
</div>

<script>
// ---- palette: validated per-game team pairs; one accent (marker orange) -----
const TEAM_COLORS = {
  OKC: '#3D8FD1', GSW: '#B8892E', CLE: '#E05A50', IND: '#3D8FD1',
  TOR: '#E05A50', POR: '#E05A50', CHA: '#2FA8A0', SAC: '#2FA8A0', MEM: '#B8892E', LAL: '#B8892E',
};
const FALLBACK = ['#E05A50', '#3D8FD1'];
const ACCENT = '#e8622d';
const CHALK = '#e9e7e2';
const COURT = { floor: '#1e2126', line: '#4d5560', paint: 'rgba(233,231,226,0.03)' };
const CONF_BAR = 0.7;  // below this a call is typographically "quiet"

// ---- fixed full-court camera -------------------------------------------------
const W = 1400, H = 760, PAD = 34;
const SC = Math.min((W - 2 * PAD) / 94, (H - 2 * PAD) / 50);
const OX = PAD + (W - 2 * PAD - 94 * SC) / 2, OY = PAD + (H - 2 * PAD - 50 * SC) / 2;
const ftx = x => OX + x * SC;
const fty = y => OY + y * SC;

const S = {
  data: null, frame: 0, playing: false, speed: 1,
  layers: { matchups: false, actions: true, trail: true },
  homeColor: FALLBACK[0], visitorColor: FALLBACK[1],
  events: [], sort: 'time', currentId: null,
};
const $ = id => document.getElementById(id);
const cur = () => S.data ? S.data.frames[Math.floor(S.frame)] : null;

// ---- scene (layer registry: M3 coverage / M4 fact highlights append here) ----
const LAYERS = [
  { id: 'court', draw: drawCourt },
  { id: 'matchups', draw: drawMatchups },
  { id: 'players', draw: drawPlayers },
  { id: 'ball', draw: drawBall },
  { id: 'actions', draw: drawActions },
];

function drawCourt(ctx) {
  ctx.fillStyle = COURT.floor;
  ctx.beginPath(); ctx.roundRect(ftx(0), fty(0), 94 * SC, 50 * SC, 4); ctx.fill();
  ctx.strokeStyle = COURT.line; ctx.lineWidth = 1.25;
  const arc = (x, y, r, a0, a1) => { ctx.beginPath(); ctx.arc(ftx(x), fty(y), r * SC, a0, a1); ctx.stroke(); };
  const line = (x0, y0, x1, y1) => { ctx.beginPath(); ctx.moveTo(ftx(x0), fty(y0)); ctx.lineTo(ftx(x1), fty(y1)); ctx.stroke(); };
  ctx.strokeRect(ftx(0), fty(0), 94 * SC, 50 * SC);
  line(47, 0, 47, 50);
  arc(47, 25, 6, 0, 2 * Math.PI);
  for (const [bx, dir] of [[5.25, 1], [88.75, -1]]) {
    const base = bx - dir * 5.25;
    ctx.fillStyle = COURT.paint;
    ctx.fillRect(ftx(Math.min(base, base + dir * 19)), fty(17), 19 * SC, 16 * SC);
    ctx.strokeRect(ftx(Math.min(base, base + dir * 19)), fty(17), 19 * SC, 16 * SC);
    arc(base + dir * 19, 25, 6, 0, 2 * Math.PI);
    line(base + dir * 4, 22, base + dir * 4, 28);
    line(base, 3, base + dir * 14, 3);
    line(base, 47, base + dir * 14, 47);
    const a = Math.asin(22 / 23.75);
    if (dir === 1) arc(bx, 25, 23.75, -a, a); else arc(bx, 25, 23.75, Math.PI - a, Math.PI + a);
    ctx.strokeStyle = ACCENT;
    arc(bx, 25, 0.75, 0, 2 * Math.PI);
    ctx.strokeStyle = COURT.line;
  }
}

// Nudge near-coincident points apart (display only). Mirrors viz.py spread_overlaps.
function spreadOverlaps(pts, minSep = 2.0) {
  for (let k = 0; k < 8; k++) {
    let moved = false;
    for (let i = 0; i < pts.length; i++) for (let j = i + 1; j < pts.length; j++) {
      let dx = pts[j][0] - pts[i][0], dy = pts[j][1] - pts[i][1], d = Math.hypot(dx, dy);
      if (d >= minSep) continue;
      if (d < 1e-6) { dx = 1; dy = 0; d = 1; }
      const push = (minSep - d) / 2, ux = dx / d, uy = dy / d;
      pts[i][0] -= ux * push; pts[i][1] -= uy * push;
      pts[j][0] += ux * push; pts[j][1] += uy * push;
      moved = true;
    }
    if (!moved) break;
  }
  return pts;
}

function computePos() {
  const f = cur(); if (!f) return null;
  const spread = spreadOverlaps(f.players.map(p => [p[2], p[3]]));
  const map = new Map();
  f.players.forEach((p, i) => map.set(p[1], { x: spread[i][0], y: spread[i][1], team: p[0] }));
  return map;
}

function holderPid(f) {
  if (!f.ball) return null;
  let best = null, bd = 3.0;
  for (const [, pid, x, y] of f.players) {
    const d = Math.hypot(x - f.ball[0], y - f.ball[1]);
    if (d < bd) { best = pid; bd = d; }
  }
  return best;
}

// Participants only: the offensive five (plus their defenders when matchup
// lines are shown). Falls back to everyone when no matchup info for the frame.
function visiblePids(f) {
  if (!S.layers.participants) return null;
  const pairs = S.matchupsByIdx.get(f.idx);
  if (!pairs) return null;
  const keep = new Set();
  for (const [o, d] of pairs) { keep.add(o); if (S.layers.matchups) keep.add(d); }
  return keep;
}

function drawPlayers(ctx, S) {
  if (!S.pos) return;
  const f = cur();
  const home = S.data.game.home_team_id;
  const holder = holderPid(f);
  const vis = visiblePids(f);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `700 ${Math.max(9, 0.62 * SC)}px ui-monospace, Menlo, monospace`;
  for (const [pid, { x, y, team }] of S.pos.entries()) {
    if (vis && !vis.has(pid)) continue;
    ctx.beginPath();
    ctx.arc(ftx(x), fty(y), 1.0 * SC, 0, 2 * Math.PI);
    ctx.fillStyle = team === home ? S.homeColor : S.visitorColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(233,231,226,0.8)'; ctx.lineWidth = 1.5;
    ctx.stroke();
    if (pid === holder) {  // chalk circle: who has the ball
      ctx.strokeStyle = CHALK; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(ftx(x), fty(y), 1.3 * SC, 0, 2 * Math.PI); ctx.stroke();
    }
    ctx.fillStyle = '#ffffff';
    ctx.fillText(S.names[pid]?.jersey ?? '', ftx(x), fty(y) + 0.5);
  }
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

function drawMatchups(ctx, S) {
  if (!S.layers.matchups) return;
  const f = cur(); if (!f || !S.pos) return;
  const pairs = S.matchupsByIdx.get(f.idx); if (!pairs) return;
  ctx.strokeStyle = 'rgba(152,147,138,0.45)'; ctx.lineWidth = 1.25; ctx.setLineDash([5, 5]);
  for (const [o, d] of pairs) {
    const a = S.pos.get(o), b = S.pos.get(d);
    if (!a || !b) continue;
    ctx.beginPath(); ctx.moveTo(ftx(a.x), fty(a.y)); ctx.lineTo(ftx(b.x), fty(b.y)); ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawBall(ctx, S) {
  const i = Math.floor(S.frame), TRAIL = 25;
  if (S.layers.trail) {
    for (let j = Math.max(1, i - TRAIL); j <= i; j++) {
      const a = S.data.frames[j - 1]?.ball, b = S.data.frames[j].ball;
      if (!a || !b) continue;
      const t = (j - (i - TRAIL)) / TRAIL;
      ctx.strokeStyle = ACCENT; ctx.globalAlpha = 0.55 * t; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(ftx(a[0]), fty(a[1])); ctx.lineTo(ftx(b[0]), fty(b[1])); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  const b = cur()?.ball; if (!b) return;
  ctx.beginPath();
  ctx.arc(ftx(b[0]), fty(b[1]), (0.55 + b[2] / 22) * SC, 0, 2 * Math.PI);
  ctx.fillStyle = ACCENT; ctx.fill();
  ctx.strokeStyle = '#17191d'; ctx.lineWidth = 1; ctx.stroke();
}

const whoShort = pid => S.names[pid] ? `${S.names[pid].name} #${S.names[pid].jersey}` : pid;

function labelPill(ctx, x, y, text, dashed) {
  ctx.font = `600 12px ui-monospace, Menlo, monospace`;
  const w = ctx.measureText(text).width + 18, h = 21;
  ctx.beginPath(); ctx.roundRect(x, y - h / 2, w, h, 4);
  ctx.fillStyle = 'rgba(23,25,29,0.92)'; ctx.fill();
  ctx.strokeStyle = ACCENT; ctx.lineWidth = 1;
  if (dashed) ctx.setLineDash([3, 3]);
  ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = CHALK; ctx.textBaseline = 'middle';
  ctx.fillText(text, x + 9, y + 0.5);
  ctx.textBaseline = 'alphabetic';
}

function drawActions(ctx, S) {
  if (!S.layers.actions) return;
  const f = cur(); if (!f || !S.pos) return;
  const POP = 10;
  for (const act of S.actions) {
    if (f.idx < act.start_idx || f.idx > act.end_idx) continue;
    const p = S.pos.get(act.p1); if (!p) continue;
    const quiet = act.confidence < CONF_BAR;
    const t = Math.min(1, (Math.floor(S.frame) - act._startPos) / POP);
    const ease = 1 - (1 - t) ** 3;
    ctx.globalAlpha = 0.3 + 0.7 * ease;
    ctx.strokeStyle = ACCENT; ctx.lineWidth = 2.25;
    if (quiet) ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(ftx(p.x), fty(p.y), (1.6 + 1.5 * (1 - ease)) * SC, 0, 2 * Math.PI);
    ctx.stroke(); ctx.setLineDash([]);
    labelPill(ctx, ftx(p.x) + 2.0 * SC, fty(p.y) - 2.0 * SC - 5 * (1 - ease),
      `${act.type.toUpperCase()} ${whoShort(act.p1)}`, quiet);
    ctx.globalAlpha = 1;
  }
}

// ---- render loop ----------------------------------------------------------
const canvas = $('court'), ctx = canvas.getContext('2d');
const FPS = 25;
let lastT = null;

function render() {
  ctx.clearRect(0, 0, W, H);
  S.pos = S.data ? computePos() : null;
  for (const l of LAYERS) if (S.data || l.id === 'court') l.draw(ctx, S);
  const f = cur();
  if (f) {
    const mm = String(Math.floor(f.game_clock / 60)).padStart(2, '0');
    const ss = (f.game_clock % 60).toFixed(1).padStart(4, '0');
    $('gclock').textContent =
      `Q${f.quarter} ${mm}:${ss}` + (f.shot_clock != null ? ` sc${f.shot_clock.toFixed(0).padStart(3, ' ')}` : '');
    const total = S.data.frames.length;
    $('ptime').textContent = `${(Math.floor(S.frame) / FPS).toFixed(1)} / ${((total - 1) / FPS).toFixed(1)}s`;
    $('scrub').value = Math.floor(S.frame);
    for (const c of S.callEls || []) {
      const live = f.idx >= c.act.start_idx && f.idx <= c.act.end_idx;
      if (live === c.wasLive) continue;
      c.wasLive = live;
      c.el.classList.toggle('live', live);
      if (live) c.el.scrollIntoView({ block: 'nearest' });
    }
    for (const s of S.sentEls || []) {
      const live = f.idx >= s.start && f.idx < s.end;
      if (live === s.wasLive) continue;
      s.wasLive = live;
      s.el.classList.toggle('live', live);
    }
    updateRoster(f);
  }
}

function updateRoster(f) {
  const key = f.players.map(p => p[1]).join(',');
  if (key === S.rosterKey || !S.names) return;
  S.rosterKey = key;
  const home = S.data.game.home_team_id;
  const side = teamHome => f.players
    .filter(p => (p[0] === home) === teamHome)
    .map(p => S.names[p[1]] ? { j: +S.names[p[1]].jersey, n: S.names[p[1]].name } : { j: p[1], n: '?' })
    .sort((a, b) => a.j - b.j)
    .map(({ j, n }) => `<span class="p"><em>#${j}</em> ${n}</span>`).join('');
  $('roster').innerHTML =
    `<div class="team"><b style="color:${S.homeColor}">${S.data.game.home_abbr}</b>${side(true)}</div>` +
    `<div class="team"><b style="color:${S.visitorColor}">${S.data.game.visitor_abbr}</b>${side(false)}</div>`;
}

function tick(t) {
  if (S.playing && S.data) {
    if (lastT != null) {
      S.frame += (t - lastT) / 1000 * FPS * S.speed;
      if (S.frame >= S.data.frames.length) { S.frame = S.data.frames.length - 1; setPlaying(false); }
    }
  }
  lastT = t;
  render();
  requestAnimationFrame(tick);
}

// ---- controls ---------------------------------------------------------------
function setPlaying(p) {
  S.playing = p;
  $('play').textContent = p ? '⏸' : '▶';
  $('play').classList.toggle('on', p);
}

$('play').onclick = () => {
  if (!S.data) return;
  if (!S.playing && S.frame >= S.data.frames.length - 1) S.frame = 0;
  setPlaying(!S.playing);
};
$('scrub').oninput = e => { setPlaying(false); S.frame = +e.target.value; };
$('speed').onchange = e => { S.speed = +e.target.value; };
$('prev').onclick = () => stepEvent(-1);
$('next').onclick = () => stepEvent(1);
for (const b of document.querySelectorAll('#chips button')) {
  b.onclick = () => {
    S.layers[b.dataset.l] = !S.layers[b.dataset.l];
    b.classList.toggle('on', S.layers[b.dataset.l]);
  };
}

function stepEvent(d) {
  const i = S.events.findIndex(e => e.event_id === S.currentId) + d;
  if (i < 0 || i >= S.events.length) return;
  selectEvent(S.events[i].event_id);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') e.target.blur();
  if (e.code === 'Space') { e.preventDefault(); $('play').onclick(); }
  else if (e.code === 'ArrowRight') { setPlaying(false); S.frame = Math.min((S.data?.frames.length ?? 1) - 1, S.frame + (e.shiftKey ? 10 : 1)); }
  else if (e.code === 'ArrowLeft') { setPlaying(false); S.frame = Math.max(0, S.frame - (e.shiftKey ? 10 : 1)); }
});

// ---- calls stream -------------------------------------------------------------
const clockStr = s => `${Math.floor(s / 60)}:${String(Math.round(s % 60)).padStart(2, '0')}`;

function renderCalls() {
  const box = $('calls');
  box.innerHTML = '';
  S.callEls = [];
  if (!S.actions.length) {
    box.innerHTML = `<div class="empty"><div class="h">No calls.</div>` +
      `<div class="s">Nothing in this possession cleared the confidence bar.</div></div>`;
    return;
  }
  const acts = [...S.actions].sort(S.sort === 'conf'
    ? (a, b) => b.confidence - a.confidence
    : (a, b) => a.start_idx - b.start_idx);
  for (const act of acts) {
    const div = document.createElement('div');
    const quiet = act.confidence < CONF_BAR;
    div.className = 'call' + (quiet ? ' dim' : '');
    div.title = `confidence ${act.confidence.toFixed(2)}`;
    const rel = (act._startPos / FPS).toFixed(1).padStart(4, '0');
    div.innerHTML =
      `<span class="ts">${rel}</span><span class="k">${act.type}</span>` +
      `<span class="who">${whoShort(act.p1)}${act.p2 != null ? ' → ' + whoShort(act.p2) : ''}</span>` +
      `<span class="cf ${quiet ? 'lo' : 'hi'}">${act.confidence >= 1 ? '1.0' : '.' + String(Math.round(act.confidence * 100)).padStart(2, '0')}</span>`;
    div.onclick = () => { setPlaying(false); S.frame = act._startPos; };
    box.append(div);
    S.callEls.push({ el: div, act, wasLive: false });
  }
}

for (const b of document.querySelectorAll('.sort button')) {
  b.onclick = () => {
    S.sort = b.dataset.s;
    for (const x of document.querySelectorAll('.sort button')) x.classList.toggle('on', x === b);
    renderCalls();
  };
}

// ---- data loading ---------------------------------------------------------
async function selectEvent(eventId) {
  const g = $('game').value;
  S.currentId = eventId;
  $('poss').value = String(eventId);
  S.data = await (await fetch(`/api/games/${g}/events/${eventId}`)).json();
  const gm = S.data.game;
  S.homeColor = TEAM_COLORS[gm.home_abbr] ?? FALLBACK[0];
  S.visitorColor = TEAM_COLORS[gm.visitor_abbr] ?? FALLBACK[1];
  if (S.homeColor === S.visitorColor) S.visitorColor = S.homeColor === FALLBACK[1] ? FALLBACK[0] : FALLBACK[1];
  S.matchupsByIdx = new Map();
  for (const r of S.data.matchups) {
    if (!S.matchupsByIdx.has(r.moment_idx)) S.matchupsByIdx.set(r.moment_idx, []);
    S.matchupsByIdx.get(r.moment_idx).push([r.off_player_id, r.def_player_id]);
  }
  // M3 coverages join the calls stream as first-class entries anchored on the
  // defender executing the coverage (d2), with the on-ball defender as p2.
  const covs = (S.data.coverages ?? []).map(c => ({
    type: c.coverage, start_idx: c.start_idx, end_idx: c.end_idx,
    p1: c.d2, p2: c.d1, confidence: c.confidence, gc_start: c.gc_start,
  }));
  S.actions = [...S.data.actions, ...covs];
  S.names = S.data.players;
  S.frame = 0; setPlaying(false); S.rosterKey = '';
  const meta = S.events.find(e => e.event_id === eventId);
  $('status').innerHTML = `<b>${gm.visitor_abbr} @ ${gm.home_abbr}</b> · Q${meta.quarter} · poss #${eventId}`;
  $('pbp').innerHTML = `<b>PBP</b>` + (meta.desc ? `${meta.desc}` : 'no logged entry for this segment') +
    `<a href="https://www.nba.com/stats/events?GameID=${g}&GameEventID=${eventId}&Season=2015-16&flag=1" target="_blank">Watch clip ↗</a>`;
  const total = S.data.frames.length;
  for (const act of S.actions) {
    act._startPos = Math.max(0, S.data.frames.findIndex(f => f.idx >= act.start_idx));
    act._endPos = Math.max(act._startPos, S.data.frames.findIndex(f => f.idx >= act.end_idx));
  }
  const ticks = $('ticks');
  ticks.innerHTML = '';
  for (const act of S.actions) {
    const tk = document.createElement('div');
    tk.className = 'tick';
    tk.style.opacity = 0.35 + 0.65 * act.confidence;
    tk.style.left = `${(100 * act._startPos / Math.max(1, total - 1)).toFixed(2)}%`;
    tk.title = `${act.type} · confidence ${act.confidence.toFixed(2)}`;
    tk.onclick = () => { setPlaying(false); S.frame = act._startPos; };
    ticks.append(tk);
  }
  $('scrub').max = total - 1;
  renderCalls();
  loadCommentary(g, eventId);
}

// M4 subtitles: each sentence anchors to a fact's start frame; the sentence
// whose window contains the playhead lights up, clicking a sentence seeks.
async function loadCommentary(g, eventId) {
  $('commentary').innerHTML = '';
  S.sentEls = [];
  const c = await (await fetch(`/api/games/${g}/events/${eventId}/commentary`)).json();
  if (S.currentId !== eventId) return;  // stale response
  const sents = c.sentences ?? [];
  for (let k = 0; k < sents.length; k++) {
    const s = sents[k];
    const div = document.createElement('div');
    div.className = 'sent';
    div.textContent = s.text;
    const pos = Math.max(0, S.data.frames.findIndex(f => f.idx >= s.start_idx));
    div.onclick = () => { setPlaying(false); S.frame = pos; };
    $('commentary').append(div);
    S.sentEls.push({ el: div, start: s.start_idx, wasLive: false });
  }
  for (let k = 0; k < S.sentEls.length; k++) {
    S.sentEls[k].end = k + 1 < S.sentEls.length ? S.sentEls[k + 1].start : Infinity;
  }
}

const MIN_FRAMES = 75;  // hide <3s fragments (FTs, subs, replay reviews)

async function loadGame() {
  const g = $('game').value;
  S.events = (await (await fetch(`/api/games/${g}/events`)).json())
    .filter(e => e.n_moments >= MIN_FRAMES);
  $('poss').innerHTML = S.events.map(e => {
    const d = e.desc ? ` — ${e.desc.slice(0, 46)}` : '';
    return `<option value="${e.event_id}">#${e.event_id} Q${e.quarter} ${clockStr(e.start_clock)}–${clockStr(e.end_clock)}${d}</option>`;
  }).join('');
  if (S.events.length) await selectEvent(S.events[0].event_id);
}

async function init() {
  const games = await (await fetch('/api/games')).json();
  $('game').innerHTML = games.map(g =>
    `<option value="${g.game_id}">${g.date} ${g.visitor_abbr} @ ${g.home_abbr}</option>`).join('');
  $('game').onchange = loadGame;
  $('poss').onchange = e => selectEvent(+e.target.value);
  if (games.length) await loadGame();
  requestAnimationFrame(tick);
}
init();
</script>
